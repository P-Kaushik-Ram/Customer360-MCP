<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer360 AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── STEP 1: Replace this URL with your App Runner URL ── */
    /* See the const API_URL below in the script section      */

    :root {
      --bg:        #0a0e1a;
      --surface:   #111827;
      --border:    #1f2d45;
      --accent:    #00c6ff;
      --accent2:   #0072ff;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --user-bg:   #0d2137;
      --bot-bg:    #111827;
      --success:   #22c55e;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ───────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .aws-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      background: rgba(0,198,255,0.08);
      border: 1px solid rgba(0,198,255,0.2);
      padding: 3px 10px;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }

    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .spacer { flex: 1; }

    .status-pill {
      font-size: 11px;
      font-family: var(--mono);
      padding: 3px 10px;
      border-radius: 4px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.25);
      color: var(--success);
    }

    /* ── CHAT AREA ──────────────────────────────────────────── */
    .chat-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .chat-wrap::-webkit-scrollbar { width: 4px; }
    .chat-wrap::-webkit-scrollbar-track { background: transparent; }
    .chat-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── WELCOME ────────────────────────────────────────────── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 16px;
      text-align: center;
      opacity: 1;
      transition: opacity 0.3s;
    }

    .welcome.hidden { display: none; }

    .welcome-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 0 32px rgba(0,198,255,0.2);
    }

    .welcome h2 { font-size: 22px; font-weight: 600; letter-spacing: -0.03em; }
    .welcome p  { font-size: 14px; color: var(--muted); max-width: 400px; line-height: 1.6; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
      max-width: 560px;
    }

    .suggestion {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      font-family: var(--sans);
    }

    .suggestion:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,198,255,0.05);
    }

    /* ── MESSAGES ───────────────────────────────────────────── */
    .msg-row {
      display: flex;
      gap: 12px;
      animation: fadeUp 0.25s ease both;
    }

    @keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }

    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .avatar.bot  { background: linear-gradient(135deg, var(--accent2), var(--accent)); }
    .avatar.user { background: var(--user-bg); border: 1px solid var(--border); }

    .bubble {
      max-width: 72%;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-row.bot  .bubble { background: var(--bot-bg); border: 1px solid var(--border); }
    .msg-row.user .bubble { background: var(--user-bg); border: 1px solid rgba(0,198,255,0.2); }

    .bubble.data {
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.8;
      overflow-x: auto;
    }

    /* ── TYPING INDICATOR ───────────────────────────────────── */
    .typing {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s;  }

    @keyframes bounce { 0%,80%,100%{transform:translateY(0);} 40%{transform:translateY(-6px);} }

    /* ── INPUT BAR ──────────────────────────────────────────── */
    .input-wrap {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 900px;
      margin: 0 auto;
    }

    textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      padding: 12px 16px;
      resize: none;
      min-height: 48px;
      max-height: 140px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    button#send {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }

    button#send:hover  { opacity: 0.9; }
    button#send:active { transform: scale(0.95); }
    button#send:disabled { opacity: 0.4; cursor: not-allowed; }

    button#send svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .hint {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      margin-top: 8px;
      font-family: var(--mono);
    }
  </style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────── -->
<header>
  <div class="aws-badge"><div class="dot"></div>AWS App Runner</div>
  <div>
    <h1>Customer360 AI Assistant</h1>
    <div class="subtitle">MCP → Snowflake Cortex Analyst</div>
  </div>
  <div class="spacer"></div>
  <div class="status-pill" id="status-pill">● Connecting…</div>
</header>

<!-- ── CHAT AREA ────────────────────────────────────────────── -->
<div class="chat-wrap" id="chat">

  <div class="welcome" id="welcome">
    <div class="welcome-icon">🔮</div>
    <h2>Ask about your customers</h2>
    <p>Powered by Snowflake Cortex Analyst. Ask any business question in plain English.</p>
    <div class="suggestions">
      <button class="suggestion" onclick="fillQ(this)">How many customers are there?</button>
      <button class="suggestion" onclick="fillQ(this)">Which city has the most customers?</button>
      <button class="suggestion" onclick="fillQ(this)">Show top products by revenue</button>
      <button class="suggestion" onclick="fillQ(this)">How many customers have pending payments?</button>
      <button class="suggestion" onclick="fillQ(this)">Which customers have a Converted lead status?</button>
      <button class="suggestion" onclick="fillQ(this)">Total revenue from ERP orders</button>
    </div>
  </div>

</div>

<!-- ── INPUT BAR ─────────────────────────────────────────────── -->
<div class="input-wrap">
  <div class="input-row">
    <textarea id="input" placeholder="Ask a question about your Customer360 data…" rows="1"></textarea>
    <button id="send" onclick="sendMsg()" title="Send">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="hint">Powered by AWS App Runner → MCP → Snowflake Cortex Analyst</div>
</div>

<script>
  // ── STEP 1: PASTE YOUR APP RUNNER URL HERE ─────────────────
  // After deploying, replace this with your actual URL
  // e.g. "https://abc123.us-east-1.awsapprunner.com"
  const API_URL = "https://ylsh1jh8y3.execute-api.us-east-1.amazonaws.com";
  // ───────────────────────────────────────────────────────────

  const chat    = document.getElementById("chat");
  const welcome = document.getElementById("welcome");
  const input   = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const pill    = document.getElementById("status-pill");

  // Auto-resize textarea
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 140) + "px";
  });

  // Send on Enter (Shift+Enter = newline)
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  });

  // Click suggestion
  function fillQ(el) {
    input.value = el.textContent;
    input.dispatchEvent(new Event("input"));
    sendMsg();
  }

  function addMsg(role, text, isData = false) {
    welcome.classList.add("hidden");

    const row = document.createElement("div");
    row.className = `msg-row ${role}`;

    const av = document.createElement("div");
    av.className = `avatar ${role}`;
    av.textContent = role === "bot" ? "⬡" : "U";

    const bub = document.createElement("div");
    bub.className = `bubble${isData ? " data" : ""}`;
    bub.textContent = text;

    if (role === "bot") {
      row.appendChild(av);
      row.appendChild(bub);
    } else {
      row.appendChild(bub);
      row.appendChild(av);
    }

    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
    return bub;
  }

  function addTyping() {
    welcome.classList.add("hidden");
    const row = document.createElement("div");
    row.className = "msg-row bot";
    row.id = "typing-row";

    const av = document.createElement("div");
    av.className = "avatar bot";
    av.textContent = "⬡";

    const bub = document.createElement("div");
    bub.className = "bubble";
    bub.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

    row.appendChild(av);
    row.appendChild(bub);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing-row");
    if (t) t.remove();
  }

  async function sendMsg() {
    const q = input.value.trim();
    if (!q || sendBtn.disabled) return;

    addMsg("user", q);
    input.value = "";
    input.style.height = "auto";
    sendBtn.disabled = true;
    addTyping();

    try {
      const res = await fetch(`${API_URL}/ask`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: q }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      removeTyping();

      const answer = data.answer || "No answer returned.";
      const isTabular = answer.includes(" | ") && answer.includes("---");
      addMsg("bot", answer, isTabular);

    } catch (err) {
      removeTyping();
      addMsg("bot", `⚠️ Could not reach the server.\n\nMake sure API_URL is set correctly in this file.\n\nError: ${err.message}`);
    }

    sendBtn.disabled = false;
    input.focus();
  }

  // ── Health check on load ────────────────────────────────────
  (async () => {
    if (API_URL === "REPLACE_WITH_APP_RUNNER_URL") {
      pill.textContent = "⚠ Set API_URL first";
      pill.style.background = "rgba(239,68,68,0.1)";
      pill.style.borderColor = "rgba(239,68,68,0.3)";
      pill.style.color = "#ef4444";
      return;
    }
    try {
      const r = await fetch(`${API_URL}/health`);
      if (r.ok) {
        pill.textContent = "● Connected";
        pill.style.background = "rgba(34,197,94,0.1)";
        pill.style.borderColor = "rgba(34,197,94,0.25)";
        pill.style.color = "#22c55e";
      } else throw new Error();
    } catch {
      pill.textContent = "✕ Offline";
      pill.style.background = "rgba(239,68,68,0.1)";
      pill.style.borderColor = "rgba(239,68,68,0.3)";
      pill.style.color = "#ef4444";
    }
  })();
</script>
</body>
</html>
